services:
  - type: web
    name: dokument-oborot-trk
    env: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
